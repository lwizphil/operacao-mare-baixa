name: Download Arquivos

on:

  workflow_dispatch:

jobs:

  download:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar bibliotecas
        run: |
          pip install -r requirements.txt

      - name: Executar
        run: |
          python download.py

      - name: Commit
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add downloads
          git add logs

          git commit -m "Downloads automáticos" || echo "Sem alterações"

          git push
